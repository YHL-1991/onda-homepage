backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/static/images"

locale: "ko"

collections:
  - name: "content"
    label: "홈페이지 콘텐츠"
    files:
      - name: "homepage"
        label: "홈페이지 전체 콘텐츠"
        file: "content/content.yml"
        fields:
          # ===== 사이트 정보 =====
          - label: "사이트 정보"
            name: "site"
            widget: "object"
            collapsed: true
            fields:
              - { label: "페이지 타이틀 (브라우저 탭)", name: "title", widget: "string" }
              - { label: "SEO 설명", name: "description", widget: "text" }
              - { label: "브랜드명", name: "brand_name", widget: "string" }

          # ===== 히어로 =====
          - label: "히어로 섹션 (메인 배너)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "뱃지 텍스트", name: "badge", widget: "string" }
              - { label: "제목 첫째줄", name: "title_line1", widget: "string" }
              - { label: "강조 텍스트 (빨간색)", name: "title_highlight", widget: "string" }
              - { label: "설명 1줄", name: "subtitle_line1", widget: "string" }
              - { label: "설명 2줄", name: "subtitle_line2", widget: "string" }
              - { label: "설명 3줄", name: "subtitle_line3", widget: "string" }
              - { label: "메인 버튼", name: "button_primary", widget: "string" }
              - { label: "보조 버튼", name: "button_secondary", widget: "string" }
              - label: "통계 수치"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "숫자", name: "number", widget: "string" }
                  - { label: "설명", name: "label", widget: "string" }
              - { label: "폰 목업 타이틀", name: "phone_title", widget: "string" }
              - { label: "폰 목업 서브타이틀", name: "phone_subtitle", widget: "string" }
              - { label: "폰 목업 버튼", name: "phone_button", widget: "string" }
              - label: "플로팅 카드"
                name: "floating_cards"
                widget: "list"
                fields:
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "description", widget: "string" }

          # ===== 문제 인식 =====
          - label: "문제 인식 섹션"
            name: "problem"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "문제 카드 (3개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "통계 수치", name: "stat", widget: "string" }
                  - { label: "카드 제목", name: "title", widget: "string" }
                  - { label: "카드 설명", name: "description", widget: "text" }

          # ===== 솔루션 =====
          - label: "솔루션 섹션"
            name: "solution"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목 첫째줄", name: "title_line1", widget: "string" }
              - { label: "강조 텍스트", name: "title_highlight", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "솔루션 카드 (4개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "카드 제목", name: "title", widget: "string" }
                  - { label: "카드 설명", name: "description", widget: "text" }

          # ===== 이용방법 =====
          - label: "이용방법 섹션"
            name: "how"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "강조 텍스트", name: "title_highlight", widget: "string" }
              - { label: "제목 나머지", name: "title_rest", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "단계 (4개)"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "단계 제목", name: "title", widget: "string" }
                  - { label: "단계 설명", name: "description", widget: "text" }

          # ===== 보상 시스템 =====
          - label: "보상 시스템 섹션"
            name: "rewards"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "보상 카드 (6개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "카드 제목", name: "title", widget: "string" }
                  - { label: "카드 설명", name: "description", widget: "text" }

          # ===== 후기 =====
          - label: "베타 테스터 후기"
            name: "testimonials"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - label: "후기 (3개)"
                name: "reviews"
                widget: "list"
                fields:
                  - { label: "별점", name: "stars", widget: "string" }
                  - { label: "후기 내용", name: "text", widget: "text" }
                  - { label: "이름", name: "name", widget: "string" }
                  - { label: "아바타 글자", name: "avatar", widget: "string" }
                  - { label: "정보", name: "meta", widget: "string" }
                  - { label: "결과", name: "result", widget: "string" }

          # ===== CTA =====
          - label: "CTA 섹션 (다운로드 유도)"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "제목 1줄", name: "title_line1", widget: "string" }
              - { label: "제목 2줄", name: "title_line2", widget: "string" }
              - { label: "설명 1줄", name: "description_line1", widget: "string" }
              - { label: "설명 2줄", name: "description_line2", widget: "string" }
              - { label: "버튼 텍스트", name: "button_text", widget: "string" }
              - { label: "버튼 링크", name: "button_href", widget: "string" }

          # ===== 푸터 =====
          - label: "푸터"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "저작권 문구", name: "copyright", widget: "string" }
