backend:
  name: git-gateway
  branch: main

media_folder: "static/images"
public_folder: "/static/images"

locale: "ko"

collections:
  - name: "content"
    label: "홈페이지 콘텐츠"
    files:
      - name: "homepage"
        label: "홈페이지 전체 콘텐츠"
        file: "content/content.yml"
        fields:
          # ===== 사이트 정보 =====
          - label: "사이트 정보"
            name: "site"
            widget: "object"
            collapsed: true
            fields:
              - { label: "페이지 타이틀 (브라우저 탭)", name: "title", widget: "string" }
              - { label: "SEO 설명", name: "description", widget: "text" }
              - { label: "브랜드명", name: "brand_name", widget: "string" }

          # ===== 네비게이션 =====
          - label: "네비게이션"
            name: "nav"
            widget: "object"
            collapsed: true
            fields:
              - label: "메뉴 링크"
                name: "links"
                widget: "list"
                fields:
                  - { label: "메뉴 이름", name: "text", widget: "string" }
                  - { label: "링크 주소", name: "href", widget: "string" }
              - label: "CTA 버튼"
                name: "cta"
                widget: "object"
                fields:
                  - { label: "버튼 텍스트", name: "text", widget: "string" }
                  - { label: "링크 주소", name: "href", widget: "string" }

          # ===== 히어로 =====
          - label: "히어로 섹션 (메인 배너)"
            name: "hero"
            widget: "object"
            collapsed: true
            fields:
              - { label: "뱃지 텍스트", name: "badge", widget: "string" }
              - { label: "제목 첫째줄", name: "headline_line1", widget: "string" }
              - { label: "강조 텍스트 (금색)", name: "headline_highlight", widget: "string" }
              - { label: "제목 연결어", name: "headline_line2", widget: "string" }
              - { label: "제목 마지막줄", name: "headline_line3", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "주요 버튼"
                name: "button_primary"
                widget: "object"
                fields:
                  - { label: "버튼 텍스트", name: "text", widget: "string" }
                  - { label: "링크", name: "href", widget: "string" }
              - label: "보조 버튼"
                name: "button_secondary"
                widget: "object"
                fields:
                  - { label: "버튼 텍스트", name: "text", widget: "string" }
                  - { label: "링크", name: "href", widget: "string" }
              - label: "통계 수치 (3개)"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "숫자", name: "number", widget: "string" }
                  - { label: "설명", name: "label", widget: "string" }
              - { label: "체중계 표시 무게 (숫자)", name: "scale_weight", widget: "string" }
              - label: "플로팅 카드"
                name: "floating_cards"
                widget: "list"
                fields:
                  - { label: "라벨", name: "label", widget: "string" }
                  - { label: "값", name: "value", widget: "string" }
                  - { label: "단위 (%, kg 등)", name: "unit", widget: "string", required: false }
                  - { label: "바 너비 (%)", name: "bar_width", widget: "string", required: false }
                  - { label: "바 색상 (CSS 변수)", name: "bar_color", widget: "string", required: false }

          # ===== 문제 인식 =====
          - label: "문제 인식 섹션"
            name: "problem"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "문제 카드 (4개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "통계 수치", name: "stat", widget: "string" }
                  - { label: "카드 제목", name: "title", widget: "string" }
                  - { label: "카드 설명", name: "description", widget: "text" }

          # ===== 솔루션 =====
          - label: "솔루션 섹션"
            name: "solution"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "솔루션 카드 (6개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "카드 제목", name: "title", widget: "string" }
                  - { label: "카드 설명", name: "description", widget: "text" }
                  - { label: "태그", name: "tag", widget: "string" }

          # ===== 제품 라인업 =====
          - label: "제품 라인업 섹션"
            name: "product"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "제품 목록 (5개)"
                name: "lineup"
                widget: "list"
                fields:
                  - { label: "모델명 (C/A/M/Y/X)", name: "model", widget: "string" }
                  - { label: "제품 이름", name: "name", widget: "string" }
                  - { label: "추천 제품 (BEST 배지)", name: "featured", widget: "boolean", default: false }
                  - label: "기능 목록"
                    name: "features"
                    widget: "list"
                    field: { label: "기능", name: "feature", widget: "string" }
                  - { label: "가격 (숫자+콤마)", name: "price", widget: "string" }

          # ===== 3단계 프로그램 =====
          - label: "3단계 프로그램"
            name: "program"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "단계 (3개)"
                name: "steps"
                widget: "list"
                fields:
                  - { label: "단계 제목", name: "title", widget: "string" }
                  - { label: "기간", name: "period", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }
                  - label: "태그"
                    name: "tags"
                    widget: "list"
                    field: { label: "태그", name: "tag", widget: "string" }

          # ===== B2B =====
          - label: "B2B 솔루션 섹션"
            name: "b2b"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "B2B 카드 (3개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }
                  - label: "특장점"
                    name: "features"
                    widget: "list"
                    field: { label: "특장점", name: "feature", widget: "string" }

          # ===== 기술 =====
          - label: "기술 섹션"
            name: "tech"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "기술 카드 (4개)"
                name: "cards"
                widget: "list"
                fields:
                  - { label: "번호/라벨", name: "number", widget: "string" }
                  - { label: "제목", name: "title", widget: "string" }
                  - { label: "설명", name: "description", widget: "text" }

          # ===== 시장 =====
          - label: "시장 분석 섹션"
            name: "market"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "시장 통계 (4개)"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "수치", name: "value", widget: "string" }
                  - { label: "설명 (줄바꿈: \\n)", name: "label", widget: "string" }
              - label: "TAM/SAM/SOM (3개)"
                name: "tam_cards"
                widget: "list"
                fields:
                  - { label: "분류 (TAM/SAM/SOM)", name: "title", widget: "string" }
                  - { label: "금액", name: "value", widget: "string" }
                  - { label: "설명", name: "description", widget: "string" }

          # ===== CTA =====
          - label: "CTA 섹션 (행동 유도)"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - { label: "섹션 라벨", name: "label", widget: "string" }
              - { label: "제목", name: "title", widget: "string" }
              - { label: "설명", name: "description", widget: "text" }
              - label: "주요 버튼"
                name: "button_primary"
                widget: "object"
                fields:
                  - { label: "텍스트", name: "text", widget: "string" }
                  - { label: "링크 (mailto: 등)", name: "href", widget: "string" }
              - label: "보조 버튼"
                name: "button_secondary"
                widget: "object"
                fields:
                  - { label: "텍스트", name: "text", widget: "string" }
                  - { label: "링크", name: "href", widget: "string" }
              - label: "연락처"
                name: "contact_info"
                widget: "object"
                fields:
                  - { label: "이메일", name: "email", widget: "string" }
                  - { label: "웹사이트", name: "web", widget: "string" }
                  - { label: "전화번호", name: "tel", widget: "string" }

          # ===== 푸터 =====
          - label: "푸터"
            name: "footer"
            widget: "object"
            collapsed: true
            fields:
              - { label: "브랜드 설명", name: "brand_description", widget: "text" }
              - label: "링크 컬럼 (3개)"
                name: "columns"
                widget: "list"
                fields:
                  - { label: "컬럼 제목", name: "title", widget: "string" }
                  - label: "링크"
                    name: "links"
                    widget: "list"
                    fields:
                      - { label: "텍스트", name: "text", widget: "string" }
                      - { label: "URL", name: "href", widget: "string" }
              - { label: "저작권 문구", name: "copyright", widget: "string" }
              - { label: "주소", name: "address", widget: "string" }
