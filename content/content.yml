# ===== 문제 인식 =====
problem:
  label: "Problem"
  title: "비만 치료의 숨겨진 위기"
  description: "GLP-1 비만치료제는 혁신적이지만, 약물 중단 후 대부분의 환자가 요요현상을 겪습니다"
  cards:
    - stat: "80%"
      title: "요요현상 발생률"
      description: "전세계 위고비 환자의 80%가 약물 중단 후 급격한 체중 반등을 경험합니다"
    - stat: "40%"
      title: "근손실 부작용"
      description: "체중감소분의 40%가 근육 손실이며, 골밀도 감소 문제도 함께 발생합니다"
    - stat: "50만원"
      title: "높은 치료 비용"
      description: "비급여 위고비 처방 평균가 50만원, 중단 시 반복 복용이 필요합니다"
    - stat: "700%"
      title: "환자 급증"
      description: "GLP-1 처방 환자가 4년간 700% 폭증했지만, 사후관리 솔루션은 전무합니다"

# ===== 솔루션 =====
solution:
  label: "Solution"
  title: "온다가 만드는 평생 건강 습관"
  description: "동기부여 없이도 작동하는 시스템으로 요요 방지부터 근육 보존까지 한 번에 해결합니다"
  cards:
    - title: "8극 BIA 정밀 측정"
      description: "상하체를 분리 측정하는 8극 BIA 센서로 최대 56개 체성분 항목을 집에서 매일 측정합니다. 북경체육대학교 DEXA 임상에서 체지방 r=0.939, 골격근 r=0.968 검증 완료."
      tag: "Hardware"
    - title: "AI 대사증후군 예측"
      description: "매일 축적되는 체성분 데이터를 AI가 학습해 대사증후군 위험도를 사전에 예측하고 선제적 알림을 제공합니다."
      tag: "AI Engine"
    - title: "맞춤 건강 코칭"
      description: "체성분 변화 패턴을 분석해 개인별 식단, 운동, 수면 계획을 자동 생성합니다. 영양사, 트레이너, 의사 원격 상담도 연결됩니다."
      tag: "Coaching"
    - title: "게임화 동기부여"
      description: "다이어트배틀, 커뮤니티 챌린지, 포인트 보상 등 장기 사용률 80%를 목표로 하는 게임화 요소를 적용했습니다."
      tag: "Gamification"
    - title: "데이터 시각화"
      description: "월간 리포트와 대시보드로 자신의 건강 추세를 한눈에 파악합니다. 발전을 실감할 수 있어 지속적인 동기를 유지합니다."
      tag: "Dashboard"
    - title: "인지행동치료 기반"
      description: "\"어차피 나는 못 빠져\"라는 고정관념을 타파합니다. 과학적 근거 기반으로 심리적 장벽을 넘어서는 솔루션을 제공합니다."
      tag: "CBT"

