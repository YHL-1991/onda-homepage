# ===== 3단계 프로그램 =====
program:
  label: "3-Step Program"
  title: "3단계 졸업 프로그램"
  description: "GLP-1 약물 의존도를 점진적으로 줄이면서 건강한 습관으로 독립하는 체계적 프로그램"
  steps:
    - title: "습관 학습 단계"
      period: "0 ~ 6개월"
      description: "AI가 사용자의 대사 프로필을 생성합니다. 개인별 패턴을 파악하고 맞춤형 식단, 운동, 수면 계획을 자동으로 생성합니다."
      tags:
        - "AI 루틴 학습"
        - "대사 프로필 생성"
        - "패턴 분석"
    - title: "점진적 전환 단계"
      period: "7 ~ 12개월"
      description: "약물 의존도를 매월 10~20%씩 줄이며 디지털 코칭을 강화합니다. 영양사, 트레이너, 의사 모니터링이 동반됩니다."
      tags:
        - "디지털 코칭"
        - "전문가 개입"
        - "근손실 방지"
    - title: "자율 관리 단계"
      period: "13 ~ 24개월"
      description: "사용자 패턴 파악이 완료되어 선제적 알림과 장기 습관 유지 메커니즘이 작동합니다. 완전한 자율 관리가 가능해집니다."
      tags:
        - "선제적 알림"
        - "자율 독립"
        - "습관 정착"

